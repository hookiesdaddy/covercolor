<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>colorpick</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css?v=18" />
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="card">

    <!-- ── Main view ── -->
    <div id="main-view">
      <header>
        <div class="logo">
          <span class="logo-dot" id="logo-dot"></span>
          colorpick
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="settings-btn" title="Settings" aria-label="Settings">
            <!-- API / plug icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M14.25 9.75L16.5 12l-2.25 2.25m-4.5 0L7.5 12l2.25-2.25M6 20.25h12A2.25 2.25 0 0020.25 18V6A2.25 2.25 0 0018 3.75H6A2.25 2.25 0 003.75 6v12A2.25 2.25 0 006 20.25z" />
            </svg>
          </button>
        </div>
      </header>

      <div class="tabs">
        <button class="tab active" data-mode="upload">Upload</button>
        <button class="tab" data-mode="url">URL</button>
      </div>

      <form id="form">
        <div id="upload-mode" class="mode">
          <label class="dropzone" for="file-input" id="dropzone">
            <div class="dropzone-inner">
              <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
              </svg>
              <span id="file-label-text" class="dropzone-text">Drop an image or click to browse</span>
              <span class="dropzone-hint">PNG, JPG, GIF, WebP up to 10MB</span>
            </div>
            <input type="file" id="file-input" accept="image/*" />
          </label>
        </div>

        <div id="url-mode" class="mode hidden">
          <div class="url-input-wrap">
            <svg class="url-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244" />
            </svg>
            <input type="url" id="url-input" placeholder="https://example.com/image.jpg" />
          </div>
        </div>

        <button type="submit" class="submit-btn">
          <span class="btn-text">Extract Color</span>
        </button>
      </form>

      <div id="result" class="result hidden">
        <div class="color-row">
          <div class="color-chip" id="primary-chip" title="Click to use this color">
            <span class="color-label">Primary</span>
            <button id="hex-primary" class="hex-btn" title="Click to copy">
              <span id="hex-primary-text">—</span>
              <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184" />
              </svg>
            </button>
            <span id="rgb-primary" class="rgb-value">—</span>
            <span class="copied-toast hidden" data-for="primary">Copied!</span>
          </div>
          <div class="color-chip" id="secondary-chip" title="Click to use this color">
            <span class="color-label">Secondary</span>
            <button id="hex-secondary" class="hex-btn" title="Click to copy">
              <span id="hex-secondary-text">—</span>
              <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184" />
              </svg>
            </button>
            <span id="rgb-secondary" class="rgb-value">—</span>
            <span class="copied-toast hidden" data-for="secondary">Copied!</span>
          </div>
        </div>

        <button id="set-lights-btn" class="set-lights-btn">
          <span class="set-lights-text">Set Lights</span>
          <span class="lights-progress" id="lights-progress"></span>
        </button>
        <div id="lights-status" class="lights-status hidden"></div>
      </div>

      <!-- ── Controls bar (always visible) ── -->
      <div class="controls-bar">
        <button class="icon-btn" id="reload-btn" title="Start over" aria-label="Start over">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
          </svg>
        </button>
        <button class="options-btn" id="options-btn" aria-label="Options">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75" />
          </svg>
          Options
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
          </svg>
        </button>
      </div>

      <!-- ── Options panel ── -->
      <div id="options-panel" class="options-panel hidden">
        <label class="toggle-row">
          <span class="toggle-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
            </svg>
            Use brighter color for lights
          </span>
          <div class="toggle-switch">
            <input type="checkbox" id="brighter-toggle" />
            <span class="toggle-slider"></span>
          </div>
        </label>

        <label class="toggle-row">
          <span class="toggle-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5" />
            </svg>
            Prefer secondary color
          </span>
          <div class="toggle-switch">
            <input type="checkbox" id="prefer-secondary-toggle" />
            <span class="toggle-slider"></span>
          </div>
        </label>

        <div id="skip-neutrals-wrap">
          <label class="toggle-row">
            <span class="toggle-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.53 16.122a3 3 0 00-5.78 1.128 2.25 2.25 0 01-2.4 2.245 4.5 4.5 0 008.4-2.245c0-.399-.078-.78-.22-1.128zm0 0a15.998 15.998 0 003.388-1.62m-5.043-.025a15.994 15.994 0 011.622-3.395m3.42 3.42a15.995 15.995 0 004.764-4.648l3.876-5.814a1.151 1.151 0 00-1.597-1.597L14.146 6.32a15.996 15.996 0 00-4.649 4.763m3.42 3.42a6.776 6.776 0 00-3.42-3.42" />
              </svg>
              Skip dark &amp; grey tones
            </span>
            <div class="toggle-switch">
              <input type="checkbox" id="skip-neutrals-toggle" />
              <span class="toggle-slider"></span>
            </div>
          </label>
          <div id="reload-hint" class="reload-hint hidden">
            Reload to apply this change —
            <button id="reload-hint-btn" class="reload-hint-btn">reload now</button>
          </div>
        </div>

        <label class="toggle-row">
          <span class="toggle-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
            </svg>
            Use color preferences
          </span>
          <div class="toggle-switch">
            <input type="checkbox" id="prefs-toggle" />
            <span class="toggle-slider"></span>
          </div>
        </label>

        <div id="prefs-expand" class="prefs-expand hidden">
          <ul id="color-prefs-list" class="color-prefs-list"></ul>
        </div>
      </div>

      <div id="error" class="error hidden"></div>
    </div>

    <!-- ── Settings view ── -->
    <div id="settings-view" class="settings-view hidden">
      <header class="settings-header">
        <button class="icon-btn" id="settings-back" aria-label="Back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
          </svg>
        </button>
        <span class="settings-title">Settings</span>
      </header>

      <section class="settings-section">
        <h3 class="section-title">Govee Setup</h3>
        <p class="section-desc">Your API key is stored locally in the browser.</p>
        <div class="api-key-row">
          <input type="password" id="api-key-input" class="api-key-input" placeholder="Paste your Govee API key…" autocomplete="off" />
          <button id="api-key-toggle" class="icon-btn small" title="Show / hide">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </button>
        </div>
        <div class="api-btn-row">
          <button id="save-key-btn" class="action-btn primary-btn">Save Key</button>
          <button id="test-key-btn" class="action-btn">Test Connection</button>
        </div>
        <div id="key-status" class="key-status hidden"></div>
      </section>
    </div>

  </div>

  <script src="/static/app.js?v=18"></script>
</body>
</html>
